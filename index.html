---
layout: home
---
<div class="homeBio">
  <div class="bioProfile">
      <img src="{{ site.ur l}}/build/images/rodrigo-ibarra.jpg" alt="This is a pic of me in front of a burrito place">
  </div>
  <div class="bioText">
      <p>Mexican, front-end developer and head of Devops @ <a href="http://prepaenlinea.sep.gob.mx">Prepa en Línea</a>, longboard rider, lord of the Asphalt Belly Flop </p>
  </div>
</div>
  <div class="posts">
    <ul class="postList">
        {% for post in site.categories.posts limit:6 %}
        <li class="postList_item">
            <a href="{{ post.url }}" class="issue">
                <h2 class="postTitle">
                  <span class="postChapter">Chapter</span>
                  <span class="postChapter_number">{{ post.number }}</span>
                  {{ post.title }}
                </h2>
              </a>  
        </li>
        {% endfor %}
    </ul>
  </div>
